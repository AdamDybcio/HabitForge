name: habit_forge
description: "A simple habit tracking app built with Flutter."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.4
  flutter_timezone: ^4.1.1
  google_fonts: ^8.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  mocktail: ^1.0.4
  provider: ^6.1.5+1
  timezone: ^0.11.0
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  solid_lints: ^0.3.3


flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: assets/logo.png
  adaptive_icon_background: "#F8F9FA"
  adaptive_icon_foreground: assets/logo.png

flutter_native_splash:
  color: "#F8F9FA"
  color_dark: "#101417"
  image: assets/logo.png
  image_dark: assets/logo.png
  web: true
  android_12:
    color: "#F8F9FA"
    color_dark: "#101417"
    image: assets/logo.png
    image_dark: assets/logo.png
